name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint · build · test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskboard
          POSTGRES_PASSWORD: taskboard
          POSTGRES_DB: taskboard
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U taskboard"
          --health-interval 10s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: taskboard
      DB_PASSWORD: taskboard
      DB_NAME: taskboard
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Build shared package
        run: npm ci && npm run build
        working-directory: shared
      - name: Install backend deps
        run: npm ci
        working-directory: backend
      - name: Lint
        run: npx eslint "{src,apps,libs,test}/**/*.ts" --max-warnings 0
        working-directory: backend
      - name: Build
        run: npm run build
        working-directory: backend
      - name: Test
        run: npm test -- --runInBand --forceExit
        working-directory: backend

  frontend:
    name: Frontend (lint · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build shared package
        run: npm ci && npm run build
        working-directory: shared
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Lint
        run: npx eslint .
        working-directory: frontend
      - name: Test
        run: npm run test
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  docker:
    name: Docker prod images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile.prod -t taskboard-backend:ci .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile.prod -t taskboard-frontend:ci .
