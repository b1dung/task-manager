name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Laravel (format · test)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: taskboard
          MYSQL_USER: taskboard
          MYSQL_PASSWORD: taskboard
        ports: ['3306:3306']
        options: >-
          --health-cmd "mysqladmin ping -uroot -proot --silent"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: taskboard
      DB_USERNAME: taskboard
      DB_PASSWORD: taskboard
      CACHE_STORE: array
      SESSION_DRIVER: array
      MAIL_MAILER: array
      BROADCAST_CONNECTION: null
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, pcntl
          coverage: none
      - run: composer install --no-interaction --prefer-dist
        working-directory: laravel-backend
      - run: vendor/bin/pint --test
        working-directory: laravel-backend
      - run: php artisan migrate:fresh --seed --force
        working-directory: laravel-backend
      - run: php artisan test
        working-directory: laravel-backend

  frontend:
    name: React (lint · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  docker:
    name: Production images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f laravel-backend/Dockerfile.prod -t taskboard-backend:ci laravel-backend
      - run: docker build -f frontend/Dockerfile.prod -t taskboard-frontend:ci .
